apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
spec:
  selector:
    matchLabels:
      app: app2
  replicas: 1
  template:
    metadata:
      labels:
        app: app2
    spec:
      containers:
      - name: flask
        image: app2:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5002
---
apiVersion: v1
kind: Service
metadata:
  name: app2
spec:
  ports:
  - port: 5002
    targetPort: 5002
  selector:
    app: app2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2-worker
spec:
  selector:
    matchLabels:
      app: app2-worker
  replicas: 1
  template:
    metadata:
      labels:
        app: app2-worker
    spec:
      containers:
      - name: worker
        image: app2:latest
        imagePullPolicy: Never
        command: ["celery", "-A", "tasks.celery_app", "worker", "--loglevel=info"]
