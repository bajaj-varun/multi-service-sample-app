apiVersion: apps/v1
kind: Deployment
metadata:
  name: app3
spec:
  selector:
    matchLabels:
      app: app3
  replicas: 1
  template:
    metadata:
      labels:
        app: app3
    spec:
      containers:
      - name: flask
        image: app3:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5003
---
apiVersion: v1
kind: Service
metadata:
  name: app3
spec:
  ports:
  - port: 5003
    targetPort: 5003
  selector:
    app: app3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app3-worker
spec:
  selector:
    matchLabels:
      app: app3-worker
  replicas: 1
  template:
    metadata:
      labels:
        app: app3-worker
    spec:
      containers:
      - name: worker
        image: app3:latest
        imagePullPolicy: Never
        command: ["celery", "-A", "tasks.celery_app", "worker", "--loglevel=info"]
